name: Terraform PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"

permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write  # Required to post plan as PR comment

env:
  TF_WORKING_DIR: infra
  AWS_REGION: ap-southeast-2

jobs:
  terraform-check:
    name: Format, Validate & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9.0

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true
        env:
          TF_VAR_domain_name: ${{ secrets.TF_VAR_DOMAIN_NAME }}

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fmt_outcome = '${{ steps.fmt.outcome }}';
            const init_outcome = '${{ steps.init.outcome }}';
            const validate_outcome = '${{ steps.validate.outcome }}';
            const plan_outcome = '${{ steps.plan.outcome }}';
            const plan_output = `${{ steps.plan.outputs.stdout }}`;
            const plan_error = `${{ steps.plan.outputs.stderr }}`;

            // Truncate plan if it's too long for a GH comment (max 65536 chars)
            const max_len = 60000;
            const plan_text = plan_output.length > max_len
              ? plan_output.substring(0, max_len) + '\n\n... (truncated)'
              : plan_output;

            const body = `## Terraform PR Check Results

            | Step | Result |
            |------|--------|
            | Format | \`${fmt_outcome}\` |
            | Init | \`${init_outcome}\` |
            | Validate | \`${validate_outcome}\` |
            | Plan | \`${plan_outcome}\` |

            <details><summary>Plan Output</summary>

            \`\`\`terraform
            ${plan_text}
            \`\`\`

            </details>

            <details><summary>Plan Errors (if any)</summary>

            \`\`\`
            ${plan_error}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if format, validate, or plan failed
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: |
          echo "::error::One or more Terraform checks failed."
          echo "  Format:   ${{ steps.fmt.outcome }}"
          echo "  Validate: ${{ steps.validate.outcome }}"
          echo "  Plan:     ${{ steps.plan.outcome }}"
          exit 1
